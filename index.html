<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Library</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%230c0c0c'/><text y='.9em' font-size='80' x='10'>📚</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Cormorant+Garamond:wght@400;600;700&display=swap');
  :root{
    --bg:#0c0c0c;--surface:#161616;--surface2:#1f1f1f;
    --border:#2a2a2a;--border2:#383838;
    --accent:#c9a84c;--accent-dim:#7c6b3a;--accent-glow:rgba(201,168,76,0.08);
    --text:#e2d9c8;--muted:#5e5a54;--danger:#9b4444;--success:#4a7c59;
    --sw:240px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;display:grid;grid-template-columns:var(--sw) 1fr;grid-template-rows:auto 1fr;transition:grid-template-columns 0.25s;}
  body.sc{--sw:0px;}

  /* TOPBAR */
  .topbar{grid-column:1/-1;background:var(--surface);border-bottom:1px solid var(--border);padding:0.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;}
  .topbar-left{display:flex;align-items:center;gap:0.75rem;}
  .logo{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:700;color:var(--accent);letter-spacing:0.05em;}
  .version{font-size:0.6rem;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase;}
  .topbar-right{display:flex;gap:0.5rem;align-items:center;}
  .autosave{font-size:0.6rem;color:var(--muted);letter-spacing:0.1em;}
  .autosave.saved{color:var(--success);}
  .sidebar-toggle{background:none;border:1px solid var(--border);color:var(--muted);border-radius:4px;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.9rem;transition:color 0.15s,border-color 0.15s;}
  .sidebar-toggle:hover{color:var(--accent);border-color:var(--accent-dim);}

  /* SIDEBAR */
  .sidebar{background:var(--surface);border-right:1px solid var(--border);overflow:hidden;height:calc(100vh - 53px);position:sticky;top:53px;transition:width 0.25s;width:var(--sw);}
  body.sc .sidebar{border-right:none;}
  .sidebar-inner{width:240px;padding:1.25rem 0;overflow-y:auto;height:100%;}
  .sidebar-section{padding:0 1rem;margin-bottom:1.5rem;}
  .sidebar-label{font-size:0.6rem;text-transform:uppercase;letter-spacing:0.2em;color:var(--muted);margin-bottom:0.5rem;padding:0 0.25rem;}
  .folder-item{display:flex;align-items:center;padding:0.45rem 0.6rem;border-radius:4px;cursor:pointer;font-size:0.75rem;color:var(--text);transition:background 0.15s;gap:0.5rem;}
  .folder-item:hover{background:var(--surface2);}
  .folder-item.active{background:var(--accent-glow);color:var(--accent);border:1px solid var(--accent-dim);}
  .folder-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .folder-count{font-size:0.6rem;color:var(--muted);}
  .folder-actions{display:none;gap:0.25rem;}
  .folder-item:hover .folder-actions{display:flex;}
  .icon-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.7rem;padding:0.1rem 0.25rem;border-radius:3px;transition:color 0.15s;}
  .icon-btn:hover{color:var(--accent);}
  .icon-btn.danger:hover{color:var(--danger);}
  .new-folder-form{display:none;margin-top:0.5rem;}
  .new-folder-form.open{display:flex;gap:0.4rem;}
  .mini-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:'DM Mono',monospace;font-size:0.7rem;padding:0.35rem 0.5rem;outline:none;}
  .mini-input:focus{border-color:var(--accent-dim);}

  /* MAIN */
  .main{padding:1.5rem;overflow-y:auto;height:calc(100vh - 53px);}
  .main-tabs{display:flex;gap:0.25rem;margin-bottom:1.25rem;border-bottom:1px solid var(--border);}
  .tab-btn{background:none;border:none;color:var(--muted);font-family:'DM Mono',monospace;font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;padding:0.5rem 1rem;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color 0.15s;}
  .tab-btn:hover{color:var(--text);}
  .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
  .tab-panel{display:none;}
  .tab-panel.active{display:block;}

  /* ADD FORM */
  .add-form{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:1.25rem;margin-bottom:1.5rem;}
  .form-label{font-size:0.6rem;text-transform:uppercase;letter-spacing:0.15em;color:var(--muted);margin-bottom:0.5rem;display:block;}
  .prompt-wrap{position:relative;margin-bottom:0.75rem;}
  textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'DM Mono',monospace;font-size:0.78rem;padding:0.75rem 2.5rem 0.75rem 0.75rem;resize:vertical;min-height:180px;outline:none;transition:border-color 0.2s;line-height:1.6;}
  textarea:focus{border-color:var(--accent-dim);}
  textarea::placeholder{color:var(--muted);}
  .prompt-btns{position:absolute;top:0.4rem;right:0.4rem;display:flex;flex-direction:column;gap:0.25rem;}
  .prompt-icon-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:3px;width:22px;height:22px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:color 0.15s,border-color 0.15s;}
  .prompt-icon-btn:hover{color:var(--accent);border-color:var(--accent-dim);}

  /* LOAD FROM ENTRY */
  .load-bar{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.75rem;flex-wrap:wrap;}
  .load-source{font-size:0.62rem;color:var(--muted);font-style:italic;}

  /* IMAGE UPLOAD */
  .img-upload-area{border:1px dashed var(--border);border-radius:4px;padding:1rem;margin-bottom:0.75rem;transition:border-color 0.2s,background 0.2s;}
  .img-upload-area.dragover{border-color:var(--accent);background:var(--accent-glow);}
  .img-upload-controls{display:flex;gap:0.5rem;margin-bottom:0.75rem;flex-wrap:wrap;align-items:center;}
  .img-upload-hint{font-size:0.65rem;color:var(--muted);}
  .img-thumbnails{display:flex;flex-wrap:wrap;gap:0.5rem;}
  .img-thumb{position:relative;width:144px;height:144px;border-radius:4px;overflow:hidden;border:1px solid var(--border);cursor:pointer;flex-shrink:0;}
  .img-thumb img{width:100%;height:100%;object-fit:cover;}
  .img-thumb .rm{position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.75);border:none;color:#ff6b6b;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:2;}
  .img-thumb:hover .rm{display:flex;}
  input[type="file"]{display:none;}

  .form-bottom{display:flex;align-items:center;gap:0.6rem;flex-wrap:wrap;}
  .folder-select{background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'DM Mono',monospace;font-size:0.75rem;padding:0.45rem 0.75rem;outline:none;cursor:pointer;}
  .folder-select:focus{border-color:var(--accent-dim);}

  /* BUTTONS */
  .btn{background:var(--accent);color:#0c0c0c;border:none;border-radius:4px;padding:0.5rem 1.25rem;font-family:'DM Mono',monospace;font-size:0.7rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:opacity 0.15s;}
  .btn:hover{opacity:0.85;}
  .btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--muted);padding:0.5rem 1rem;}
  .btn-ghost:hover{border-color:var(--accent-dim);color:var(--accent);opacity:1;}
  .btn-danger{background:transparent;border:1px solid var(--danger);color:var(--danger);}
  .btn-sm{padding:0.3rem 0.65rem;font-size:0.65rem;}
  .btn-perchance{background:#2a1f4e;border:1px solid #5a3f9e;color:#b89eff;font-size:0.65rem;padding:0.3rem 0.65rem;border-radius:4px;font-family:'DM Mono',monospace;letter-spacing:0.08em;cursor:pointer;transition:background 0.15s;}
  .btn-perchance:hover{background:#3d2d6e;}

  /* SEARCH */
  .search-bar{background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'DM Mono',monospace;font-size:0.75rem;padding:0.5rem 0.75rem;outline:none;width:100%;margin-bottom:1rem;transition:border-color 0.2s;}
  .search-bar:focus{border-color:var(--accent-dim);}
  .search-bar::placeholder{color:var(--muted);}

  /* ENTRIES */
  .entries{display:flex;flex-direction:column;gap:0.5rem;}
  .entry{background:var(--surface);border:1px solid var(--border);border-radius:6px;transition:border-color 0.2s;animation:fadeUp 0.25s ease;overflow:hidden;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}
  .entry:hover{border-color:var(--border2);}
  .entry.editing{border-color:var(--accent-dim);background:var(--surface2);}
  .entry.expanded{border-color:var(--accent-dim);}
  .entry.highlight{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-glow);}

  .entry-collapsed{display:grid;grid-template-columns:1fr auto auto;align-items:center;padding:0.6rem 1rem;gap:0.75rem;cursor:pointer;user-select:none;}
  .entry-preview{font-size:0.75rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .entry-preview-folder{font-size:0.6rem;color:var(--accent-dim);margin-right:0.4rem;}
  .entry-thumb-strip{display:flex;gap:0.25rem;flex-shrink:0;}
  .entry-thumb-strip img{width:32px;height:32px;object-fit:cover;border-radius:2px;border:1px solid var(--border);}
  .entry-collapsed-actions{display:flex;gap:0.3rem;flex-shrink:0;}

  .entry-expanded-body{padding:0 1rem 1rem;display:none;}
  .entry.expanded .entry-expanded-body{display:block;}
  .entry-prompt-full{font-size:0.77rem;line-height:1.65;color:var(--text);white-space:pre-wrap;word-break:break-word;margin-bottom:0.75rem;padding:0.75rem;background:var(--bg);border-radius:4px;border:1px solid var(--border);}
  .entry-images-full{display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:0.75rem;}
  .entry-images-full img{width:144px;height:144px;object-fit:cover;border-radius:4px;border:1px solid var(--border);cursor:pointer;transition:transform 0.15s,border-color 0.15s;}
  .entry-images-full img:hover{transform:scale(1.02);border-color:var(--accent-dim);}
  .entry-expanded-actions{display:flex;gap:0.4rem;flex-wrap:wrap;align-items:center;}
  .entry-meta{font-size:0.6rem;color:var(--muted);margin-left:auto;}

  .edit-textarea{width:100%;background:var(--bg);border:1px solid var(--accent-dim);border-radius:4px;color:var(--text);font-family:'DM Mono',monospace;font-size:0.77rem;padding:0.6rem 2.5rem 0.6rem 0.6rem;resize:vertical;min-height:120px;outline:none;line-height:1.65;margin-bottom:0.5rem;}
  .edit-img-area{border:1px dashed var(--border2);border-radius:4px;padding:0.75rem;margin-bottom:0.5rem;}
  .empty{text-align:center;color:var(--muted);font-size:0.75rem;padding:4rem;letter-spacing:0.1em;border:1px dashed var(--border);border-radius:6px;}

  /* GALLERY */
  .gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:0.75rem;}
  .gallery-item{position:relative;aspect-ratio:1;border-radius:5px;overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:transform 0.15s,border-color 0.15s;}
  .gallery-item:hover{transform:scale(1.02);border-color:var(--accent-dim);}
  .gallery-item img{width:100%;height:100%;object-fit:cover;}
  .gallery-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.85));padding:0.5rem 0.4rem 0.3rem;opacity:0;transition:opacity 0.2s;}
  .gallery-item:hover .gallery-overlay{opacity:1;}
  .gallery-folder-tag{font-size:0.55rem;color:var(--accent);letter-spacing:0.08em;text-transform:uppercase;}

  /* LIGHTBOX */
  .lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:1000;align-items:center;justify-content:center;flex-direction:column;gap:0.75rem;}
  .lightbox.active{display:flex;}
  .lightbox-img-wrap{position:relative;display:flex;align-items:center;justify-content:center;}
  .lightbox img{max-width:85vw;max-height:72vh;object-fit:contain;border-radius:4px;display:block;}
  .lightbox-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.15);color:var(--text);border-radius:50%;width:44px;height:44px;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s,background 0.2s;z-index:2;}
  .lightbox-img-wrap:hover .lightbox-nav{opacity:1;}
  .lightbox-nav:hover{background:rgba(201,168,76,0.3);}
  .lightbox-nav.prev{left:-58px;}
  .lightbox-nav.next{right:-58px;}
  .lightbox-close{position:fixed;top:1rem;right:1.5rem;background:none;border:none;color:var(--text);font-size:2rem;cursor:pointer;z-index:3;}
  .lightbox-counter{font-size:0.65rem;color:var(--muted);letter-spacing:0.1em;}
  .lightbox-caption{font-size:0.7rem;color:var(--muted);max-width:70vw;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .lightbox-actions{display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;justify-content:center;}

  /* MODALS */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;align-items:center;justify-content:center;}
  .modal-overlay.active{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:1.5rem;min-width:300px;max-width:500px;width:90vw;}
  .modal h3{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--accent);margin-bottom:1rem;}
  .modal-actions{display:flex;gap:0.5rem;justify-content:flex-end;margin-top:1rem;}

  /* TOAST */
  .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(15px);background:var(--accent);color:#0c0c0c;padding:0.45rem 1.25rem;border-radius:20px;font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;opacity:0;transition:all 0.25s;pointer-events:none;z-index:9999;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body id="appBody">

<div class="topbar">
  <div class="topbar-left">
    <button class="sidebar-toggle" onclick="toggleSidebar()" title="Toggle folders">☰</button>
    <span class="logo">Prompt Library</span>
    <span class="version">personal</span>
  </div>
  <div class="topbar-right">
    <span class="autosave" id="autosaveStatus">● saved</span>
    <button class="btn btn-ghost btn-sm" onclick="exportData()">Export</button>
    <label class="btn btn-ghost btn-sm" style="cursor:pointer">Import<input type="file" accept=".json" onchange="importData(this)"></label>
  </div>
</div>

<div class="sidebar" id="sidebar">
  <div class="sidebar-inner">
    <div class="sidebar-section">
      <div class="sidebar-label">Folders</div>
      <div class="folder-item active" id="folder-all" onclick="selectFolder('__all__')">
        <span class="folder-name">📁 All</span>
        <span class="folder-count" id="count-all">0</span>
      </div>
      <div id="folderList"></div>
      <div class="new-folder-form" id="newFolderForm">
        <input class="mini-input" id="newFolderInput" placeholder="Folder name..." onkeydown="if(event.key==='Enter')createFolder()">
        <button class="btn btn-sm" onclick="createFolder()">+</button>
      </div>
      <button class="btn btn-ghost btn-sm" style="width:100%;margin-top:0.5rem;font-size:0.65rem" onclick="toggleNewFolderForm()">+ New Folder</button>
    </div>
  </div>
</div>

<div class="main" id="mainArea">
  <div class="main-tabs">
    <button class="tab-btn active" onclick="switchTab(event,'library')">Library</button>
    <button class="tab-btn" onclick="switchTab(event,'gallery')">Gallery</button>
  </div>

  <!-- LIBRARY -->
  <div class="tab-panel active" id="tab-library">
    <div class="add-form">
      <span class="form-label">Prompt</span>

      <!-- Load from entry bar -->
      <div class="load-bar">
        <button class="btn btn-ghost btn-sm" onclick="openPickEntryModal()">↑ Load from Entry</button>
        <button class="btn btn-ghost btn-sm" onclick="clearForm()">✕ Clear</button>
        <span class="load-source" id="loadSourceLabel"></span>
      </div>

      <div class="prompt-wrap">
        <textarea id="promptInput" placeholder="Write or paste your prompt here..."></textarea>
        <div class="prompt-btns">
          <button class="prompt-icon-btn" onclick="pasteToEl('promptInput')" title="Paste">📋</button>
          <button class="prompt-icon-btn" onclick="copyFromEl('promptInput')" title="Copy">⎘</button>
          <button class="prompt-icon-btn" onclick="clearEl('promptInput')" title="Clear">✕</button>
        </div>
      </div>

      <div class="img-upload-area" id="dropZone">
        <div class="img-upload-controls">
          <label class="btn btn-ghost btn-sm" style="cursor:pointer">
            + Images
            <input type="file" id="imgFileInput" accept="image/*" multiple onchange="handleFiles(this.files)">
          </label>
          <button class="btn btn-ghost btn-sm" onclick="pasteImgFromClipboard()">📋 Paste Image</button>
          <span class="img-upload-hint">drag & drop • Ctrl+V</span>
        </div>
        <div class="img-thumbnails" id="newImgThumbs"></div>
      </div>

      <div class="form-bottom">
        <select class="folder-select" id="folderSelect"></select>
        <button class="btn" onclick="saveEntry()">Save Entry</button>
        <button class="btn-perchance" onclick="formToPerchance()">🎲 Perchance</button>
        <button class="btn btn-ghost btn-sm" onclick="copyFromEl('promptInput')">⎘ Copy</button>
      </div>
    </div>

    <input class="search-bar" id="searchBar" placeholder="Search prompts..." oninput="renderEntries()">
    <div class="entries" id="entriesList"></div>
  </div>

  <!-- GALLERY -->
  <div class="tab-panel" id="tab-gallery">
    <div class="gallery-grid" id="galleryGrid"></div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <div class="lightbox-img-wrap">
    <button class="lightbox-nav prev" id="lbPrev" onclick="lbNav(-1)">‹</button>
    <img id="lightboxImg" src="" alt="">
    <button class="lightbox-nav next" id="lbNext" onclick="lbNav(1)">›</button>
  </div>
  <div class="lightbox-counter" id="lbCounter"></div>
  <div class="lightbox-caption" id="lightboxCaption"></div>
  <div class="lightbox-actions" id="lbActions"></div>
</div>

<!-- RENAME FOLDER MODAL -->
<div class="modal-overlay" id="renameFolderModal">
  <div class="modal">
    <h3>Rename Folder</h3>
    <input class="mini-input" id="renameFolderInput" style="width:100%" onkeydown="if(event.key==='Enter')confirmRenameFolder()">
    <div class="modal-actions">
      <button class="btn btn-ghost btn-sm" onclick="closeModal('renameFolderModal')">Cancel</button>
      <button class="btn btn-sm" onclick="confirmRenameFolder()">Rename</button>
    </div>
  </div>
</div>

<!-- PICK ENTRY MODAL -->
<div class="modal-overlay" id="pickEntryModal">
  <div class="modal" style="max-width:560px">
    <h3>Load from Entry</h3>
    <input class="mini-input" id="pickSearch" style="width:100%;margin-bottom:0.75rem" placeholder="Search..." oninput="renderPickList()">
    <div id="pickList" style="max-height:320px;overflow-y:auto;display:flex;flex-direction:column;gap:0.4rem;"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost btn-sm" onclick="closeModal('pickEntryModal')">Cancel</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let data={folders:['General'],entries:[],lastFolder:'General'};
let currentFolder='__all__';
let newImgs=[];
let renamingFolder=null;
let editingId=null;
let expandedId=null;
let lbImages=[];
let lbIndex=0;

function loadData(){
  try{const s=localStorage.getItem('promptLibV6');if(s)data=JSON.parse(s);if(!data.folders)data.folders=['General'];if(!data.entries)data.entries=[];if(!data.lastFolder)data.lastFolder=data.folders[0]||'General';}catch(e){}
}
function saveData(){localStorage.setItem('promptLibV6',JSON.stringify(data));setAutosave('saved');}
function setAutosave(s){const el=document.getElementById('autosaveStatus');el.textContent=s==='saved'?'● saved':'● saving...';el.className='autosave '+(s==='saved'?'saved':'');}
window.addEventListener('beforeunload',saveData);
window.addEventListener('visibilitychange',()=>{if(document.hidden)saveData();});

function toggleSidebar(){document.getElementById('appBody').classList.toggle('sc');}

function switchTab(e,tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  e.target.classList.add('active');
  if(tab==='gallery')renderGallery();
}

// FOLDERS
function renderFolders(){
  const list=document.getElementById('folderList');
  list.innerHTML=data.folders.map(f=>{
    const cnt=data.entries.filter(e=>e.folder===f).length;
    return `<div class="folder-item ${currentFolder===f?'active':''}" onclick="selectFolder('${ea(f)}')">
      <span class="folder-name">📂 ${eh(f)}</span>
      <span class="folder-count">${cnt}</span>
      <div class="folder-actions">
        <button class="icon-btn" onclick="event.stopPropagation();openRenameFolder('${ea(f)}')">✎</button>
        <button class="icon-btn danger" onclick="event.stopPropagation();deleteFolder('${ea(f)}')">✕</button>
      </div>
    </div>`;
  }).join('');
  document.getElementById('count-all').textContent=data.entries.length;
  const sel=document.getElementById('folderSelect');
  const cur=sel.value||data.lastFolder;
  sel.innerHTML=data.folders.map(f=>`<option value="${ea(f)}" ${f===cur?'selected':''}>${eh(f)}</option>`).join('');
  document.getElementById('folder-all').className='folder-item'+(currentFolder==='__all__'?' active':'');
}

function selectFolder(f){
  currentFolder=f;
  if(f!=='__all__'){data.lastFolder=f;document.getElementById('folderSelect').value=f;saveData();}
  renderFolders();
  const active=document.querySelector('.tab-panel.active')?.id;
  if(active==='tab-gallery')renderGallery();
  else renderEntries();
}

function toggleNewFolderForm(){const form=document.getElementById('newFolderForm');form.classList.toggle('open');if(form.classList.contains('open'))document.getElementById('newFolderInput').focus();}

function createFolder(){
  const inp=document.getElementById('newFolderInput');const name=inp.value.trim();
  if(!name||data.folders.includes(name))return;
  data.folders.push(name);data.lastFolder=name;inp.value='';
  document.getElementById('newFolderForm').classList.remove('open');
  saveData();renderFolders();selectFolder(name);showToast('Folder created');
}

function openRenameFolder(name){
  renamingFolder=name;document.getElementById('renameFolderInput').value=name;
  document.getElementById('renameFolderModal').classList.add('active');
  document.getElementById('renameFolderInput').focus();
}

function confirmRenameFolder(){
  const n=document.getElementById('renameFolderInput').value.trim();
  if(!n||n===renamingFolder||data.folders.includes(n))return;
  data.folders=data.folders.map(f=>f===renamingFolder?n:f);
  data.entries=data.entries.map(e=>e.folder===renamingFolder?{...e,folder:n}:e);
  if(data.lastFolder===renamingFolder)data.lastFolder=n;
  if(currentFolder===renamingFolder)currentFolder=n;
  renamingFolder=null;closeModal('renameFolderModal');
  saveData();renderFolders();renderEntries();showToast('Renamed');
}

function deleteFolder(name){
  if(!confirm(`Delete "${name}"? Entries move to General.`))return;
  data.folders=data.folders.filter(f=>f!==name);
  if(!data.folders.includes('General'))data.folders.unshift('General');
  data.entries=data.entries.map(e=>e.folder===name?{...e,folder:'General'}:e);
  if(data.lastFolder===name)data.lastFolder='General';
  if(currentFolder===name)currentFolder='__all__';
  saveData();renderFolders();renderEntries();showToast('Folder deleted');
}

function closeModal(id){document.getElementById(id).classList.remove('active');}

// IMAGES
function handleFiles(files){
  Array.from(files).forEach(file=>{
    if(!file.type.startsWith('image/'))return;
    const r=new FileReader();r.onload=e=>{newImgs.push(e.target.result);renderNewThumbs();};r.readAsDataURL(file);
  });
}

async function pasteImgFromClipboard(target,entryId){
  try{
    const items=await navigator.clipboard.read();let found=false;
    for(const item of items){
      const t=item.types.find(t=>t.startsWith('image/'));
      if(t){found=true;const blob=await item.getType(t);const r=new FileReader();
        r.onload=e=>{
          if(target==='edit'&&entryId){const en=data.entries.find(e2=>e2.id===entryId);if(!en._editImgs)en._editImgs=[...(en.images||[])];en._editImgs.push(e.target.result);renderEditImgs(entryId);}
          else{newImgs.push(e.target.result);renderNewThumbs();}
          showToast('Image pasted!');
        };r.readAsDataURL(blob);
      }
    }
    if(!found)showToast('No image in clipboard');
  }catch{showToast('Allow clipboard access in browser settings');}
}

function renderNewThumbs(){
  document.getElementById('newImgThumbs').innerHTML=newImgs.map((img,i)=>`
    <div class="img-thumb"><img src="${img}" onclick="openLightboxSingle('${img}','',null)"><button class="rm" onclick="newImgs.splice(${i},1);renderNewThumbs()">×</button></div>`).join('');
}

// Drag/drop
const dz=document.getElementById('dropZone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('dragover');});
dz.addEventListener('dragleave',()=>dz.classList.remove('dragover'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('dragover');handleFiles(e.dataTransfer.files);});

// Global Ctrl+V
document.addEventListener('paste',e=>{
  const items=e.clipboardData?.items;if(!items)return;
  for(const item of items){
    if(item.type.startsWith('image/')){
      const r=new FileReader();
      r.onload=ev=>{
        if(editingId){const en=data.entries.find(e2=>e2.id===editingId);if(en){if(!en._editImgs)en._editImgs=[...(en.images||[])];en._editImgs.push(ev.target.result);renderEditImgs(editingId);}}
        else{newImgs.push(ev.target.result);renderNewThumbs();}
        showToast('Image pasted!');
      };
      r.readAsDataURL(item.getAsFile());
    }
  }
});

function pasteToEl(id){navigator.clipboard.readText().then(t=>{document.getElementById(id).value=t;showToast('Pasted!');}).catch(()=>showToast('Allow clipboard access'));}
function copyFromEl(id){const v=document.getElementById(id).value;if(v)navigator.clipboard.writeText(v).then(()=>showToast('Copied!'));}
function clearEl(id){document.getElementById(id).value='';}

function clearForm(){
  clearEl('promptInput');newImgs=[];renderNewThumbs();
  document.getElementById('loadSourceLabel').textContent='';
  document.getElementById('imgFileInput').value='';
}

// LOAD FROM ENTRY
function openPickEntryModal(){
  document.getElementById('pickSearch').value='';
  renderPickList();
  document.getElementById('pickEntryModal').classList.add('active');
}

function renderPickList(){
  const q=document.getElementById('pickSearch').value.toLowerCase();
  const filtered=data.entries.filter(e=>e.prompt.toLowerCase().includes(q)||(e.folder||'').toLowerCase().includes(q)).slice(0,40);
  document.getElementById('pickList').innerHTML=!filtered.length
    ?'<div style="color:var(--muted);font-size:0.75rem;padding:1rem;text-align:center">No entries found</div>'
    :filtered.map(e=>`
    <div style="padding:0.5rem 0.75rem;border:1px solid var(--border);border-radius:4px;cursor:pointer;font-size:0.73rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:all 0.15s"
      onmouseover="this.style.borderColor='var(--accent-dim)';this.style.color='var(--text)'"
      onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'"
      onclick="loadEntryToForm(${e.id})">
      <span style="font-size:0.58rem;color:var(--accent-dim);margin-right:0.4rem">${eh(e.folder||'')}</span>${eh(e.prompt.substring(0,120))}${e.prompt.length>120?'…':''}
    </div>`).join('');
}

function loadEntryToForm(id){
  const entry=data.entries.find(e=>e.id===id);if(!entry)return;
  document.getElementById('promptInput').value=entry.prompt;
  newImgs=[...(entry.images||[])];renderNewThumbs();
  document.getElementById('folderSelect').value=entry.folder||data.lastFolder;
  document.getElementById('loadSourceLabel').textContent='loaded from: '+entry.prompt.substring(0,30)+'…';
  closeModal('pickEntryModal');
  showToast('Loaded!');
}

// SAVE
function saveEntry(){
  const prompt=document.getElementById('promptInput').value.trim();if(!prompt)return;
  const folder=document.getElementById('folderSelect').value||data.lastFolder;
  data.lastFolder=folder;
  data.entries.unshift({id:Date.now(),prompt,images:[...newImgs],folder,date:new Date().toLocaleDateString()});
  clearForm();
  saveData();renderFolders();renderEntries();showToast('Saved!');
}

function formToPerchance(){
  const prompt=document.getElementById('promptInput').value.trim();
  if(!prompt){showToast('Enter a prompt first');return;}
  navigator.clipboard.writeText(prompt).then(()=>{showToast('Prompt copied! Paste in Perchance');setTimeout(()=>window.open('https://perchance.org/ai-text-to-image-generator','_blank'),400);}).catch(()=>window.open('https://perchance.org/ai-text-to-image-generator','_blank'));
}

// ENTRIES
function toggleExpand(id){if(editingId===id)return;expandedId=expandedId===id?null:id;renderEntries();}
function deleteEntry(id){data.entries=data.entries.filter(e=>e.id!==id);saveData();renderFolders();renderEntries();}
function startEdit(id){editingId=id;expandedId=id;renderEntries();}

function cancelEdit(){
  const en=data.entries.find(e=>e.id===editingId);if(en)delete en._editImgs;
  editingId=null;renderEntries();
}

function confirmEdit(id){
  const val=document.getElementById('editTA_'+id).value.trim();
  const folder=document.getElementById('editFolder_'+id).value;
  if(!val)return;
  const en=data.entries.find(e=>e.id===id);
  const imgs=en._editImgs!==undefined?[...en._editImgs]:(en.images||[]);
  data.entries=data.entries.map(e=>e.id===id?{...e,prompt:val,folder,images:imgs,_editImgs:undefined}:e);
  editingId=null;expandedId=id;
  saveData();renderFolders();renderEntries();showToast('Updated!');
}

function addEditImg(id,files){
  const en=data.entries.find(e=>e.id===id);if(!en._editImgs)en._editImgs=[...(en.images||[])];
  Array.from(files).forEach(f=>{const r=new FileReader();r.onload=ev=>{en._editImgs.push(ev.target.result);renderEditImgs(id);};r.readAsDataURL(f);});
}
function removeEditImg(id,i){const en=data.entries.find(e=>e.id===id);if(!en._editImgs)en._editImgs=[...(en.images||[])];en._editImgs.splice(i,1);renderEditImgs(id);}
function renderEditImgs(id){
  const en=data.entries.find(e=>e.id===id);
  const imgs=en._editImgs!==undefined?en._editImgs:(en.images||[]);
  const c=document.getElementById('editImgs_'+id);if(!c)return;
  c.innerHTML=imgs.map((img,i)=>`<div class="img-thumb"><img src="${img}" onclick="openLightboxSingle('${img}','',null)"><button class="rm" onclick="removeEditImg(${id},${i})">×</button></div>`).join('');
}
function pasteToEditTA(id){navigator.clipboard.readText().then(t=>{document.getElementById('editTA_'+id).value=t;showToast('Pasted!');}).catch(()=>showToast('Allow clipboard access'));}
function copyEditTA(id){const v=document.getElementById('editTA_'+id).value;if(v)navigator.clipboard.writeText(v).then(()=>showToast('Copied!'));}
function copyEntryPrompt(id){const e=data.entries.find(e=>e.id===id);if(e)navigator.clipboard.writeText(e.prompt).then(()=>showToast('Copied!'));}

function loadToForm(id){
  loadEntryToForm(id);
  document.querySelector('.main').scrollTo(0,0);
}

function openPerchance(id){
  const e=data.entries.find(e2=>e2.id===id);if(!e)return;
  navigator.clipboard.writeText(e.prompt).then(()=>{showToast('Copied! Paste in Perchance');setTimeout(()=>window.open('https://perchance.org/ai-text-to-image-generator','_blank'),400);}).catch(()=>window.open('https://perchance.org/ai-text-to-image-generator','_blank'));
}

function renderEntries(){
  const q=document.getElementById('searchBar').value.toLowerCase();
  const filtered=data.entries.filter(e=>(currentFolder==='__all__'||e.folder===currentFolder)&&e.prompt.toLowerCase().includes(q));
  const list=document.getElementById('entriesList');
  if(!filtered.length){list.innerHTML='<div class="empty">No entries here yet.</div>';return;}

  list.innerHTML=filtered.map(e=>{
    const imgs=e.images||[];
    const isExp=expandedId===e.id;
    const isEd=editingId===e.id;
    const preview=e.prompt.replace(/\n/g,' ').substring(0,130)+(e.prompt.length>130?'…':'');

    if(isEd){
      const editImgs=e._editImgs!==undefined?e._editImgs:(e.images||[]);
      return `<div class="entry editing expanded">
        <div class="entry-collapsed" style="border-bottom:1px solid var(--border)">
          <span class="entry-preview"><span class="entry-preview-folder">${eh(e.folder||'')}</span>${eh(preview)}</span>
        </div>
        <div class="entry-expanded-body" style="display:block;padding:1rem">
          <div style="position:relative;margin-bottom:0.5rem">
            <textarea class="edit-textarea" id="editTA_${e.id}">${eh(e.prompt)}</textarea>
            <div class="prompt-btns">
              <button class="prompt-icon-btn" onclick="pasteToEditTA(${e.id})" title="Paste">📋</button>
              <button class="prompt-icon-btn" onclick="copyEditTA(${e.id})" title="Copy">⎘</button>
            </div>
          </div>
          <div class="edit-img-area">
            <div style="display:flex;gap:0.4rem;margin-bottom:0.5rem;flex-wrap:wrap">
              <label class="btn btn-ghost btn-sm" style="cursor:pointer;font-size:0.6rem">+ Images<input type="file" accept="image/*" multiple onchange="addEditImg(${e.id},this.files)"></label>
              <button class="btn btn-ghost btn-sm" style="font-size:0.6rem" onclick="pasteImgFromClipboard('edit',${e.id})">📋 Paste</button>
            </div>
            <div class="img-thumbnails" id="editImgs_${e.id}">
              ${editImgs.map((img,i)=>`<div class="img-thumb"><img src="${img}" onclick="openLightboxSingle('${img}','',null)"><button class="rm" onclick="removeEditImg(${e.id},${i})">×</button></div>`).join('')}
            </div>
          </div>
          <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap">
            <span style="font-size:0.6rem;color:var(--muted)">Folder:</span>
            <select class="folder-select" id="editFolder_${e.id}" style="font-size:0.65rem;padding:0.3rem 0.5rem">
              ${data.folders.map(f=>`<option value="${ea(f)}" ${f===e.folder?'selected':''}>${eh(f)}</option>`).join('')}
            </select>
            <button class="btn btn-sm" onclick="confirmEdit(${e.id})">Save</button>
            <button class="btn btn-ghost btn-sm" onclick="cancelEdit()">Cancel</button>
          </div>
        </div>
      </div>`;
    }

    return `<div class="entry ${isExp?'expanded':''}">
      <div class="entry-collapsed" onclick="toggleExpand(${e.id})">
        <span class="entry-preview"><span class="entry-preview-folder">${eh(e.folder||'')}</span>${eh(preview)}</span>
        <div class="entry-thumb-strip">
          ${imgs.slice(0,3).filter(Boolean).map(img=>`<img src="${img}" alt="">`).join('')}
          ${imgs.length>3?`<span style="font-size:0.6rem;color:var(--muted);align-self:center">+${imgs.length-3}</span>`:''}
        </div>
        <div class="entry-collapsed-actions" onclick="event.stopPropagation()">
          <button class="prompt-icon-btn" onclick="copyEntryPrompt(${e.id})" title="Copy prompt">⎘</button>
        </div>
      </div>
      <div class="entry-expanded-body">
        <div class="entry-prompt-full">${eh(e.prompt)}</div>
        ${imgs.filter(Boolean).length?`<div class="entry-images-full">${imgs.filter(Boolean).map((img,i)=>`<img src="${img}" onclick="openLightboxEntry(${e.id},${i})">`).join('')}</div>`:''}
        <div class="entry-expanded-actions">
          <button class="btn btn-ghost btn-sm" onclick="copyEntryPrompt(${e.id})">⎘ Copy</button>
          <button class="btn btn-ghost btn-sm" onclick="loadToForm(${e.id})">↑ Load</button>
          <button class="btn-perchance" onclick="openPerchance(${e.id})">🎲 Perchance</button>
          <button class="btn btn-ghost btn-sm" onclick="startEdit(${e.id})">Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deleteEntry(${e.id})">Del</button>
          <span class="entry-meta">${e.date}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

// GALLERY
function renderGallery(){
  const allImgs=[];
  data.entries.forEach(e=>{
    if(currentFolder!=='__all__'&&e.folder!==currentFolder)return;
    (e.images||[]).filter(Boolean).forEach(img=>allImgs.push({src:img,folder:e.folder,prompt:e.prompt,entryId:e.id}));
  });
  const grid=document.getElementById('galleryGrid');
  if(!allImgs.length){grid.innerHTML='<div class="empty" style="grid-column:1/-1">No images here yet.</div>';return;}
  grid.innerHTML=allImgs.map((item,i)=>`
    <div class="gallery-item" onclick='openLightboxGallery(${JSON.stringify(allImgs)},${i})'>
      <img src="${item.src}" alt="">
      <div class="gallery-overlay"><div class="gallery-folder-tag">${eh(item.folder||'')}</div></div>
    </div>`).join('');
}

// LIGHTBOX
function openLightboxEntry(entryId,startIdx){
  const en=data.entries.find(e=>e.id===entryId);if(!en)return;
  lbImages=(en.images||[]).filter(Boolean).map(img=>({src:img,prompt:en.prompt,entryId}));
  lbIndex=startIdx;showLightbox();
}
function openLightboxSingle(src,prompt,entryId){lbImages=[{src,prompt,entryId}];lbIndex=0;showLightbox();}
function openLightboxGallery(images,startIdx){lbImages=images;lbIndex=startIdx;showLightbox();}

function showLightbox(){
  if(!lbImages.length)return;
  const item=lbImages[lbIndex];
  document.getElementById('lightboxImg').src=item.src;
  document.getElementById('lightboxCaption').textContent=item.prompt?item.prompt.substring(0,100)+(item.prompt.length>100?'…':''):'';
  document.getElementById('lbCounter').textContent=lbImages.length>1?`${lbIndex+1} / ${lbImages.length}`:'';
  document.getElementById('lbPrev').style.display=lbImages.length>1?'flex':'none';
  document.getElementById('lbNext').style.display=lbImages.length>1?'flex':'none';
  const p=item.prompt||'';const eid=item.entryId||null;
  document.getElementById('lbActions').innerHTML=`
    ${p?`<button class="btn btn-ghost btn-sm" onclick="lbCopyPrompt()">⎘ Copy Prompt</button>`:''}
    ${p?`<button class="btn-perchance" onclick="lbPerchance()">🎲 Perchance</button>`:''}
    ${eid?`<button class="btn btn-ghost btn-sm" onclick="goToEntry(${eid})">→ View Entry</button>`:''}`;
  document.getElementById('lightbox').classList.add('active');
}

function lbNav(dir){lbIndex=(lbIndex+dir+lbImages.length)%lbImages.length;showLightbox();}
function closeLightbox(){document.getElementById('lightbox').classList.remove('active');}
function lbCopyPrompt(){const p=lbImages[lbIndex]?.prompt;if(p)navigator.clipboard.writeText(p).then(()=>showToast('Copied!'));}
function lbPerchance(){const p=lbImages[lbIndex]?.prompt;if(p){navigator.clipboard.writeText(p).then(()=>{showToast('Copied! Paste in Perchance');setTimeout(()=>window.open('https://perchance.org/ai-text-to-image-generator','_blank'),400);});}else window.open('https://perchance.org/ai-text-to-image-generator','_blank');}

function goToEntry(id){
  closeLightbox();
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-library').classList.add('active');
  document.querySelectorAll('.tab-btn')[0].classList.add('active');
  currentFolder='__all__';renderFolders();expandedId=id;renderEntries();
  setTimeout(()=>{
    const all=data.entries.filter(e=>currentFolder==='__all__'||e.folder===currentFolder);
    const idx=all.findIndex(e=>e.id===id);
    const els=document.querySelectorAll('.entry');
    if(els[idx]){els[idx].scrollIntoView({behavior:'smooth',block:'center'});els[idx].classList.add('highlight');setTimeout(()=>els[idx].classList.remove('highlight'),1500);}
  },100);
}

// EXPORT/IMPORT
function exportData(){const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='prompt-library-backup.json';a.click();showToast('Exported!');}
function importData(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const imp=JSON.parse(e.target.result);
      if(!confirm(`Import ${imp.entries?.length||0} entries? Will merge.`))return;
      const ids=new Set(data.entries.map(e=>e.id));
      const ne=(imp.entries||[]).filter(e=>!ids.has(e.id));
      data.entries=[...data.entries,...ne];
      const ef=new Set(data.folders);
      (imp.folders||[]).forEach(f=>{if(!ef.has(f))data.folders.push(f);});
      saveData();renderFolders();renderEntries();showToast(`Imported ${ne.length} entries!`);
    }catch{showToast('Import failed');}
  };
  r.readAsText(file);
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
function eh(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function ea(s){return String(s).replace(/'/g,"\\'").replace(/\n/g,' ');}

document.addEventListener('keydown',e=>{
  const lb=document.getElementById('lightbox');
  if(lb.classList.contains('active')){if(e.key==='ArrowLeft')lbNav(-1);else if(e.key==='ArrowRight')lbNav(1);else if(e.key==='Escape')closeLightbox();return;}
  if(e.key==='Escape'){closeModal('renameFolderModal');closeModal('pickEntryModal');if(editingId)cancelEdit();}
  if(e.key==='Enter'&&document.getElementById('renameFolderModal').classList.contains('active'))confirmRenameFolder();
});
document.getElementById('lightbox').addEventListener('click',function(e){if(e.target===this)closeLightbox();});

loadData();renderFolders();renderEntries();
document.getElementById('folderSelect').value=data.lastFolder;
</script>
</body>
</html>
