<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Library</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Cormorant+Garamond:wght@400;600;700&display=swap');

  :root {
    --bg: #0c0c0c;
    --surface: #161616;
    --surface2: #1f1f1f;
    --border: #2a2a2a;
    --border2: #383838;
    --accent: #c9a84c;
    --accent-dim: #7c6b3a;
    --accent-glow: rgba(201,168,76,0.08);
    --text: #e2d9c8;
    --muted: #5e5a54;
    --danger: #9b4444;
    --success: #4a7c59;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: grid;
    grid-template-columns: 240px 1fr;
    grid-template-rows: auto 1fr;
  }

  .topbar {
    grid-column: 1 / -1;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .topbar-left { display: flex; align-items: baseline; gap: 1rem; }
  .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 700; color: var(--accent); letter-spacing: 0.05em; }
  .version { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; }
  .topbar-right { display: flex; gap: 0.5rem; align-items: center; }

  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 1.25rem 0;
    overflow-y: auto;
    height: calc(100vh - 57px);
    position: sticky;
    top: 57px;
  }

  .sidebar-section { padding: 0 1rem; margin-bottom: 1.5rem; }
  .sidebar-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.2em; color: var(--muted); margin-bottom: 0.5rem; padding: 0 0.25rem; }

  .folder-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.45rem 0.6rem; border-radius: 4px; cursor: pointer;
    font-size: 0.75rem; color: var(--text); transition: background 0.15s; gap: 0.5rem;
  }
  .folder-item:hover { background: var(--surface2); }
  .folder-item.active { background: var(--accent-glow); color: var(--accent); border: 1px solid var(--accent-dim); }
  .folder-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .folder-count { font-size: 0.6rem; color: var(--muted); }
  .folder-actions { display: none; gap: 0.25rem; }
  .folder-item:hover .folder-actions { display: flex; }

  .icon-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.7rem; padding: 0.1rem 0.25rem; border-radius: 3px; transition: color 0.15s; }
  .icon-btn:hover { color: var(--accent); }
  .icon-btn.danger:hover { color: var(--danger); }

  .new-folder-form { display: none; margin-top: 0.5rem; }
  .new-folder-form.open { display: flex; gap: 0.4rem; }

  .mini-input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 3px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.7rem; padding: 0.35rem 0.5rem; outline: none; }
  .mini-input:focus { border-color: var(--accent-dim); }

  .main { padding: 1.5rem; overflow-y: auto; height: calc(100vh - 57px); }

  .main-tabs { display: flex; gap: 0.25rem; margin-bottom: 1.25rem; border-bottom: 1px solid var(--border); padding-bottom: 0; }
  .tab-btn { background: none; border: none; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; padding: 0.5rem 1rem; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.15s; }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .add-form { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 1.25rem; margin-bottom: 1.5rem; }
  .form-row { display: grid; grid-template-columns: 1fr auto; gap: 0.75rem; margin-bottom: 0.75rem; align-items: start; }
  .form-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.15em; color: var(--muted); margin-bottom: 0.4rem; }

  .prompt-wrap { position: relative; }
  textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.78rem; padding: 0.75rem 2.5rem 0.75rem 0.75rem; resize: vertical; min-height: 90px; outline: none; transition: border-color 0.2s; line-height: 1.6; }
  textarea:focus { border-color: var(--accent-dim); }
  textarea::placeholder { color: var(--muted); }

  .prompt-btns { position: absolute; top: 0.4rem; right: 0.4rem; display: flex; flex-direction: column; gap: 0.25rem; }
  .prompt-icon-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); border-radius: 3px; width: 22px; height: 22px; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: color 0.15s, border-color 0.15s; }
  .prompt-icon-btn:hover { color: var(--accent); border-color: var(--accent-dim); }

  .folder-select { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.75rem; padding: 0.5rem 0.75rem; outline: none; cursor: pointer; min-width: 140px; }
  .folder-select:focus { border-color: var(--accent-dim); }

  .img-upload-area { border: 1px dashed var(--border); border-radius: 4px; padding: 1rem; margin-bottom: 0.75rem; transition: border-color 0.2s, background 0.2s; }
  .img-upload-area.dragover { border-color: var(--accent); background: var(--accent-glow); }
  .img-upload-controls { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; flex-wrap: wrap; align-items: center; }
  .img-upload-hint { font-size: 0.65rem; color: var(--muted); }
  .img-thumbnails { display: flex; flex-wrap: wrap; gap: 0.5rem; }

  .img-thumb { position: relative; width: 72px; height: 72px; border-radius: 4px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; }
  .img-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .img-thumb .rm { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.75); border: none; color: #ff6b6b; border-radius: 50%; width: 16px; height: 16px; font-size: 10px; cursor: pointer; display: none; align-items: center; justify-content: center; }
  .img-thumb:hover .rm { display: flex; }
  .img-thumb:hover img { opacity: 0.85; }
  input[type="file"] { display: none; }

  .paste-hint { font-size: 0.65rem; color: var(--muted); margin-top: 0.4rem; }
  .form-actions { display: flex; gap: 0.5rem; align-items: center; margin-top: 0.75rem; }

  .btn { background: var(--accent); color: #0c0c0c; border: none; border-radius: 4px; padding: 0.55rem 1.25rem; font-family: 'DM Mono', monospace; font-size: 0.7rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-ghost { background: transparent; border: 1px solid var(--border2); color: var(--muted); padding: 0.55rem 1rem; }
  .btn-ghost:hover { border-color: var(--accent-dim); color: var(--accent); opacity: 1; }
  .btn-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
  .btn-sm { padding: 0.3rem 0.65rem; font-size: 0.65rem; }

  .search-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.75rem; padding: 0.5rem 0.75rem; outline: none; width: 100%; margin-bottom: 1rem; transition: border-color 0.2s; }
  .search-bar:focus { border-color: var(--accent-dim); }
  .search-bar::placeholder { color: var(--muted); }

  .entries { display: flex; flex-direction: column; gap: 0.6rem; }

  .entry { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 1rem 1.25rem; display: grid; grid-template-columns: 1fr auto; gap: 1rem; transition: border-color 0.2s; animation: fadeUp 0.25s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }
  .entry:hover { border-color: var(--border2); }
  .entry.editing { border-color: var(--accent-dim); background: var(--surface2); }

  .entry-top { display: flex; align-items: flex-start; gap: 0.5rem; }
  .entry-prompt { font-size: 0.77rem; line-height: 1.65; color: var(--text); white-space: pre-wrap; word-break: break-word; flex: 1; }
  .entry-prompt-btns { display: flex; flex-direction: column; gap: 0.25rem; flex-shrink: 0; }
  .entry-folder-tag { display: inline-block; font-size: 0.6rem; color: var(--accent-dim); border: 1px solid var(--accent-dim); border-radius: 10px; padding: 0.1rem 0.5rem; margin-bottom: 0.4rem; letter-spacing: 0.08em; }

  .entry-right { display: flex; flex-direction: column; align-items: flex-end; gap: 0.5rem; min-width: 160px; }
  .entry-images { display: flex; flex-wrap: wrap; gap: 0.35rem; justify-content: flex-end; max-width: 200px; }
  .entry-images img { width: 52px; height: 52px; object-fit: cover; border-radius: 3px; border: 1px solid var(--border); cursor: pointer; transition: transform 0.15s, border-color 0.15s; }
  .entry-images img:hover { transform: scale(1.06); border-color: var(--accent-dim); }
  .entry-meta { font-size: 0.6rem; color: var(--muted); }
  .entry-actions { display: flex; gap: 0.35rem; flex-wrap: wrap; justify-content: flex-end; }

  .edit-textarea { width: 100%; background: var(--bg); border: 1px solid var(--accent-dim); border-radius: 4px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.77rem; padding: 0.6rem; resize: vertical; min-height: 80px; outline: none; line-height: 1.65; margin-bottom: 0.5rem; }
  .edit-img-area { border: 1px dashed var(--border2); border-radius: 4px; padding: 0.75rem; margin-bottom: 0.5rem; }

  .empty { text-align: center; color: var(--muted); font-size: 0.75rem; padding: 4rem; letter-spacing: 0.1em; border: 1px dashed var(--border); border-radius: 6px; }

  .gallery-filters { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1rem; }
  .filter-chip { background: var(--surface); border: 1px solid var(--border); color: var(--muted); border-radius: 20px; padding: 0.25rem 0.75rem; font-size: 0.65rem; cursor: pointer; letter-spacing: 0.08em; transition: all 0.15s; }
  .filter-chip:hover, .filter-chip.active { background: var(--accent-glow); color: var(--accent); border-color: var(--accent-dim); }

  .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.75rem; }
  .gallery-item { position: relative; aspect-ratio: 1; border-radius: 5px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; transition: transform 0.15s, border-color 0.15s; }
  .gallery-item:hover { transform: scale(1.02); border-color: var(--accent-dim); }
  .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
  .gallery-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.8)); padding: 0.5rem 0.4rem 0.3rem; opacity: 0; transition: opacity 0.2s; }
  .gallery-item:hover .gallery-overlay { opacity: 1; }
  .gallery-folder-tag { font-size: 0.55rem; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; }

  .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.93); z-index: 1000; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; }
  .lightbox.active { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 80vh; object-fit: contain; border-radius: 4px; }
  .lightbox-caption { font-size: 0.7rem; color: var(--muted); max-width: 600px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lightbox-close { position: fixed; top: 1rem; right: 1.5rem; background: none; border: none; color: var(--text); font-size: 2rem; cursor: pointer; }

  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(15px); background: var(--accent); color: #0c0c0c; padding: 0.45rem 1.25rem; border-radius: 20px; font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0; transition: all 0.25s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 500; align-items: center; justify-content: center; }
  .modal-overlay.active { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 8px; padding: 1.5rem; min-width: 300px; max-width: 400px; }
  .modal h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: var(--accent); margin-bottom: 1rem; }
  .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1rem; }

  .autosave { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.1em; }
  .autosave.saved { color: var(--success); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <span class="logo">Prompt Library</span>
    <span class="version">personal</span>
  </div>
  <div class="topbar-right">
    <span class="autosave" id="autosaveStatus">● saved</span>
    <button class="btn btn-ghost btn-sm" onclick="exportData()">Export</button>
    <label class="btn btn-ghost btn-sm" style="cursor:pointer">Import<input type="file" accept=".json" onchange="importData(this)"></label>
  </div>
</div>

<div class="sidebar">
  <div class="sidebar-section">
    <div class="sidebar-label">Folders</div>
    <div class="folder-item active" id="folder-all" onclick="selectFolder('__all__')">
      <span class="folder-name">📁 All Prompts</span>
      <span class="folder-count" id="count-all">0</span>
    </div>
    <div id="folderList"></div>
    <div class="new-folder-form" id="newFolderForm">
      <input class="mini-input" id="newFolderInput" placeholder="Folder name..." onkeydown="if(event.key==='Enter')createFolder()">
      <button class="btn btn-sm" onclick="createFolder()">+</button>
    </div>
    <button class="btn btn-ghost btn-sm" style="width:100%;margin-top:0.5rem;font-size:0.65rem" onclick="toggleNewFolderForm()">+ New Folder</button>
  </div>
</div>

<div class="main">
  <div class="main-tabs">
    <button class="tab-btn active" onclick="switchTab(event,'library')">Library</button>
    <button class="tab-btn" onclick="switchTab(event,'gallery')">Gallery</button>
  </div>

  <div class="tab-panel active" id="tab-library">
    <div class="add-form">
      <div class="form-label">New Entry</div>
      <div class="form-row">
        <div>
          <div class="prompt-wrap">
            <textarea id="promptInput" placeholder="Paste your prompt here..."></textarea>
            <div class="prompt-btns">
              <button class="prompt-icon-btn" onclick="pasteToPrompt()" title="Paste from clipboard">📋</button>
              <button class="prompt-icon-btn" onclick="copyFromPrompt()" title="Copy">⎘</button>
              <button class="prompt-icon-btn" onclick="clearPrompt()" title="Clear">✕</button>
            </div>
          </div>
        </div>
        <div>
          <div class="form-label">Location</div>
          <select class="folder-select" id="folderSelect"></select>
        </div>
      </div>

      <div class="img-upload-area" id="dropZone">
        <div class="img-upload-controls">
          <label class="btn btn-ghost btn-sm" style="cursor:pointer">
            + Upload Images
            <input type="file" id="imgFileInput" accept="image/*" multiple onchange="handleFiles(this.files)">
          </label>
          <button class="btn btn-ghost btn-sm" onclick="pasteImageFromClipboard()">📋 Paste Image</button>
          <span class="img-upload-hint">or drag & drop</span>
        </div>
        <div class="img-thumbnails" id="newImgThumbs"></div>
      </div>
      <div class="paste-hint">💡 Ctrl+V anywhere to paste a copied image</div>

      <div class="form-actions">
        <button class="btn" onclick="saveEntry()">Save Entry</button>
      </div>
    </div>

    <input class="search-bar" id="searchBar" placeholder="Search prompts..." oninput="renderEntries()">
    <div class="entries" id="entriesList"></div>
  </div>

  <div class="tab-panel" id="tab-gallery">
    <div class="gallery-filters" id="galleryFilters"></div>
    <div class="gallery-grid" id="galleryGrid"></div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <img id="lightboxImg" src="" alt="">
  <div class="lightbox-caption" id="lightboxCaption"></div>
</div>

<div class="modal-overlay" id="renameFolderModal">
  <div class="modal">
    <h3>Rename Folder</h3>
    <input class="mini-input" id="renameFolderInput" style="width:100%" placeholder="New name..." onkeydown="if(event.key==='Enter')confirmRenameFolder()">
    <div class="modal-actions">
      <button class="btn btn-ghost btn-sm" onclick="closeModal('renameFolderModal')">Cancel</button>
      <button class="btn btn-sm" onclick="confirmRenameFolder()">Rename</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let data = { folders: ['General'], entries: [], lastFolder: 'General' };
  let currentFolder = '__all__';
  let newImgs = [];
  let renamingFolder = null;
  let editingId = null;
  let galleryFilter = '__all__';

  function loadData() {
    try {
      const saved = localStorage.getItem('promptLibV3');
      if (saved) data = JSON.parse(saved);
      if (!data.folders) data.folders = ['General'];
      if (!data.entries) data.entries = [];
      if (!data.lastFolder) data.lastFolder = data.folders[0] || 'General';
    } catch(e) {}
  }

  function saveData() {
    localStorage.setItem('promptLibV3', JSON.stringify(data));
    setAutosave('saved');
  }

  function setAutosave(state) {
    const el = document.getElementById('autosaveStatus');
    el.textContent = state === 'saved' ? '● saved' : '● saving...';
    el.className = 'autosave ' + (state === 'saved' ? 'saved' : '');
  }

  window.addEventListener('beforeunload', () => saveData());
  window.addEventListener('visibilitychange', () => { if (document.hidden) saveData(); });

  function switchTab(e, tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    e.target.classList.add('active');
    if (tab === 'gallery') renderGallery();
  }

  function renderFolders() {
    const list = document.getElementById('folderList');
    list.innerHTML = data.folders.map(f => {
      const count = data.entries.filter(e => e.folder === f).length;
      return `<div class="folder-item ${currentFolder === f ? 'active' : ''}" onclick="selectFolder('${ea(f)}')">
        <span class="folder-name">📂 ${eh(f)}</span>
        <span class="folder-count">${count}</span>
        <div class="folder-actions">
          <button class="icon-btn" onclick="event.stopPropagation();openRenameFolder('${ea(f)}')" title="Rename">✎</button>
          <button class="icon-btn danger" onclick="event.stopPropagation();deleteFolder('${ea(f)}')" title="Delete">✕</button>
        </div>
      </div>`;
    }).join('');

    document.getElementById('count-all').textContent = data.entries.length;
    const sel = document.getElementById('folderSelect');
    const cur = sel.value || data.lastFolder;
    sel.innerHTML = data.folders.map(f => `<option value="${ea(f)}" ${f===cur?'selected':''}>${eh(f)}</option>`).join('');
    document.getElementById('folder-all').className = 'folder-item' + (currentFolder === '__all__' ? ' active' : '');
  }

  function selectFolder(f) {
    currentFolder = f;
    if (f !== '__all__') { data.lastFolder = f; document.getElementById('folderSelect').value = f; saveData(); }
    renderFolders(); renderEntries();
  }

  function toggleNewFolderForm() {
    const form = document.getElementById('newFolderForm');
    form.classList.toggle('open');
    if (form.classList.contains('open')) document.getElementById('newFolderInput').focus();
  }

  function createFolder() {
    const input = document.getElementById('newFolderInput');
    const name = input.value.trim();
    if (!name || data.folders.includes(name)) return;
    data.folders.push(name); data.lastFolder = name; input.value = '';
    document.getElementById('newFolderForm').classList.remove('open');
    saveData(); renderFolders(); selectFolder(name); showToast('Folder created');
  }

  function openRenameFolder(name) {
    renamingFolder = name;
    document.getElementById('renameFolderInput').value = name;
    document.getElementById('renameFolderModal').classList.add('active');
    document.getElementById('renameFolderInput').focus();
  }

  function confirmRenameFolder() {
    const newName = document.getElementById('renameFolderInput').value.trim();
    if (!newName || newName === renamingFolder || data.folders.includes(newName)) return;
    data.folders = data.folders.map(f => f === renamingFolder ? newName : f);
    data.entries = data.entries.map(e => e.folder === renamingFolder ? {...e, folder: newName} : e);
    if (data.lastFolder === renamingFolder) data.lastFolder = newName;
    if (currentFolder === renamingFolder) currentFolder = newName;
    renamingFolder = null;
    closeModal('renameFolderModal');
    saveData(); renderFolders(); renderEntries(); showToast('Folder renamed');
  }

  function deleteFolder(name) {
    if (!confirm(`Delete folder "${name}"? Entries move to General.`)) return;
    data.folders = data.folders.filter(f => f !== name);
    if (!data.folders.includes('General')) data.folders.unshift('General');
    data.entries = data.entries.map(e => e.folder === name ? {...e, folder: 'General'} : e);
    if (data.lastFolder === name) data.lastFolder = 'General';
    if (currentFolder === name) currentFolder = '__all__';
    saveData(); renderFolders(); renderEntries(); showToast('Folder deleted');
  }

  function closeModal(id) { document.getElementById(id).classList.remove('active'); }

  // IMAGES
  function handleFiles(files) {
    Array.from(files).forEach(file => {
      if (!file.type.startsWith('image/')) return;
      const reader = new FileReader();
      reader.onload = e => { newImgs.push(e.target.result); renderNewThumbs(); };
      reader.readAsDataURL(file);
    });
  }

  function pasteImageFromClipboard() {
    navigator.clipboard.read().then(items => {
      let found = false;
      for (const item of items) {
        const imgType = item.types.find(t => t.startsWith('image/'));
        if (imgType) {
          found = true;
          item.getType(imgType).then(blob => {
            const reader = new FileReader();
            reader.onload = e => { newImgs.push(e.target.result); renderNewThumbs(); showToast('Image pasted!'); };
            reader.readAsDataURL(blob);
          });
        }
      }
      if (!found) showToast('No image in clipboard');
    }).catch(() => showToast('Allow clipboard access in browser settings'));
  }

  function renderNewThumbs() {
    document.getElementById('newImgThumbs').innerHTML = newImgs.map((img, i) => `
      <div class="img-thumb">
        <img src="${img}" onclick="openLightbox('${img}','')">
        <button class="rm" onclick="removeNewImg(${i})">×</button>
      </div>`).join('');
  }

  function removeNewImg(i) { newImgs.splice(i, 1); renderNewThumbs(); }

  const dropZone = document.getElementById('dropZone');
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });

  document.addEventListener('paste', e => {
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        const blob = item.getAsFile();
        const reader = new FileReader();
        reader.onload = ev => {
          if (editingId) {
            const entry = data.entries.find(e2 => e2.id === editingId);
            if (entry) { if (!entry._editImgs) entry._editImgs = [...(entry.images||[])]; entry._editImgs.push(ev.target.result); renderEditImgs(editingId); }
          } else {
            newImgs.push(ev.target.result); renderNewThumbs();
          }
          showToast('Image pasted!');
        };
        reader.readAsDataURL(blob);
      }
    }
  });

  function pasteToPrompt() {
    navigator.clipboard.readText().then(t => { document.getElementById('promptInput').value = t; showToast('Pasted!'); }).catch(() => showToast('Allow clipboard access'));
  }
  function copyFromPrompt() {
    const val = document.getElementById('promptInput').value;
    if (!val) return;
    navigator.clipboard.writeText(val).then(() => showToast('Copied!'));
  }
  function clearPrompt() { document.getElementById('promptInput').value = ''; }

  function saveEntry() {
    const prompt = document.getElementById('promptInput').value.trim();
    if (!prompt) return;
    const folder = document.getElementById('folderSelect').value || data.lastFolder;
    data.lastFolder = folder;
    data.entries.unshift({ id: Date.now(), prompt, images: [...newImgs], folder, date: new Date().toLocaleDateString() });
    document.getElementById('promptInput').value = '';
    newImgs = []; renderNewThumbs();
    document.getElementById('imgFileInput').value = '';
    saveData(); renderFolders(); renderEntries(); showToast('Saved!');
  }

  function deleteEntry(id) { data.entries = data.entries.filter(e => e.id !== id); saveData(); renderFolders(); renderEntries(); }
  function startEdit(id) { editingId = id; renderEntries(); }
  function cancelEdit() { 
    const entry = data.entries.find(e => e.id === editingId);
    if (entry) delete entry._editImgs;
    editingId = null; renderEntries(); 
  }

  function confirmEdit(id) {
    const val = document.getElementById('editTA_' + id).value.trim();
    const folder = document.getElementById('editFolder_' + id).value;
    if (!val) return;
    const entry = data.entries.find(e => e.id === id);
    const finalImgs = entry._editImgs !== undefined ? [...entry._editImgs] : (entry.images || []);
    data.entries = data.entries.map(e => e.id === id ? {...e, prompt: val, folder, images: finalImgs, _editImgs: undefined} : e);
    editingId = null;
    saveData(); renderFolders(); renderEntries(); showToast('Updated!');
  }

  function addEditImg(id, files) {
    const entry = data.entries.find(e => e.id === id);
    if (!entry._editImgs) entry._editImgs = [...(entry.images || [])];
    Array.from(files).forEach(file => {
      const reader = new FileReader();
      reader.onload = ev => { entry._editImgs.push(ev.target.result); renderEditImgs(id); };
      reader.readAsDataURL(file);
    });
  }

  function pasteEditImg(id) {
    navigator.clipboard.read().then(items => {
      for (const item of items) {
        const imgType = item.types.find(t => t.startsWith('image/'));
        if (imgType) {
          item.getType(imgType).then(blob => {
            const reader = new FileReader();
            reader.onload = e => {
              const entry = data.entries.find(e2 => e2.id === id);
              if (!entry._editImgs) entry._editImgs = [...(entry.images||[])];
              entry._editImgs.push(e.target.result);
              renderEditImgs(id); showToast('Image pasted!');
            };
            reader.readAsDataURL(blob);
          });
        }
      }
    }).catch(() => showToast('Allow clipboard access'));
  }

  function removeEditImg(id, i) {
    const entry = data.entries.find(e => e.id === id);
    if (!entry._editImgs) entry._editImgs = [...(entry.images||[])];
    entry._editImgs.splice(i, 1); renderEditImgs(id);
  }

  function renderEditImgs(id) {
    const entry = data.entries.find(e => e.id === id);
    const imgs = entry._editImgs !== undefined ? entry._editImgs : (entry.images||[]);
    const container = document.getElementById('editImgs_' + id);
    if (!container) return;
    container.innerHTML = imgs.map((img, i) => `
      <div class="img-thumb">
        <img src="${img}" onclick="openLightbox('${img}','')">
        <button class="rm" onclick="removeEditImg(${id},${i})">×</button>
      </div>`).join('');
  }

  function renderEntries() {
    const q = document.getElementById('searchBar').value.toLowerCase();
    const filtered = data.entries.filter(e => (currentFolder === '__all__' || e.folder === currentFolder) && e.prompt.toLowerCase().includes(q));
    const list = document.getElementById('entriesList');
    if (!filtered.length) { list.innerHTML = '<div class="empty">No entries here yet.</div>'; return; }

    list.innerHTML = filtered.map(e => {
      if (editingId === e.id) {
        const imgs = e._editImgs !== undefined ? e._editImgs : (e.images||[]);
        return `<div class="entry editing">
          <div style="flex:1;grid-column:1/-1">
            <div class="prompt-wrap" style="margin-bottom:0.5rem">
              <textarea class="edit-textarea" id="editTA_${e.id}">${eh(e.prompt)}</textarea>
              <div class="prompt-btns">
                <button class="prompt-icon-btn" onclick="pasteToEditPrompt(${e.id})" title="Paste">📋</button>
                <button class="prompt-icon-btn" onclick="copyEditPrompt(${e.id})" title="Copy">⎘</button>
              </div>
            </div>
            <div class="edit-img-area">
              <div style="display:flex;gap:0.4rem;margin-bottom:0.5rem;flex-wrap:wrap;align-items:center">
                <label class="btn btn-ghost btn-sm" style="cursor:pointer;font-size:0.6rem">+ Images<input type="file" accept="image/*" multiple onchange="addEditImg(${e.id},this.files)"></label>
                <button class="btn btn-ghost btn-sm" style="font-size:0.6rem" onclick="pasteEditImg(${e.id})">📋 Paste Image</button>
              </div>
              <div class="img-thumbnails" id="editImgs_${e.id}">
                ${imgs.map((img,i) => `<div class="img-thumb"><img src="${img}" onclick="openLightbox('${img}','')"><button class="rm" onclick="removeEditImg(${e.id},${i})">×</button></div>`).join('')}
              </div>
            </div>
            <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap">
              <span style="font-size:0.6rem;color:var(--muted)">Folder:</span>
              <select class="folder-select" id="editFolder_${e.id}" style="font-size:0.65rem;padding:0.3rem 0.5rem">
                ${data.folders.map(f => `<option value="${ea(f)}" ${f===e.folder?'selected':''}>${eh(f)}</option>`).join('')}
              </select>
              <button class="btn btn-sm" onclick="confirmEdit(${e.id})">Save</button>
              <button class="btn btn-ghost btn-sm" onclick="cancelEdit()">Cancel</button>
            </div>
          </div>
        </div>`;
      }

      return `<div class="entry">
        <div style="min-width:0">
          ${e.folder ? `<span class="entry-folder-tag">${eh(e.folder)}</span>` : ''}
          <div class="entry-top">
            <div class="entry-prompt">${eh(e.prompt)}</div>
            <div class="entry-prompt-btns">
              <button class="prompt-icon-btn" onclick="copyEntryPrompt(${e.id})" title="Copy prompt">⎘</button>
              <button class="prompt-icon-btn" onclick="sendToNewEntry(${e.id})" title="Load into new entry">↑</button>
            </div>
          </div>
        </div>
        <div class="entry-right">
          <div class="entry-images">
            ${(e.images||[]).filter(Boolean).map(img => `<img src="${img}" onclick="openLightbox('${img}','${ea(e.prompt.substring(0,60))}')">`).join('')}
          </div>
          <div class="entry-meta">${e.date}</div>
          <div class="entry-actions">
            <button class="btn btn-ghost btn-sm" onclick="startEdit(${e.id})">Edit</button>
            <button class="btn btn-danger btn-sm" onclick="deleteEntry(${e.id})">Del</button>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  function copyEntryPrompt(id) {
    const entry = data.entries.find(e => e.id === id);
    if (entry) navigator.clipboard.writeText(entry.prompt).then(() => showToast('Copied!'));
  }

  function sendToNewEntry(id) {
    const entry = data.entries.find(e => e.id === id);
    if (!entry) return;
    document.getElementById('promptInput').value = entry.prompt;
    document.querySelector('.main').scrollTo(0,0);
    showToast('Loaded into new entry!');
  }

  function pasteToEditPrompt(id) {
    navigator.clipboard.readText().then(t => { document.getElementById('editTA_'+id).value = t; showToast('Pasted!'); }).catch(() => showToast('Allow clipboard access'));
  }
  function copyEditPrompt(id) {
    const val = document.getElementById('editTA_'+id).value;
    if (val) navigator.clipboard.writeText(val).then(() => showToast('Copied!'));
  }

  // GALLERY
  function renderGallery() {
    document.getElementById('galleryFilters').innerHTML = `
      <div class="filter-chip ${galleryFilter==='__all__'?'active':''}" onclick="setGalleryFilter('__all__')">All Images</div>
      ${data.folders.map(f => `<div class="filter-chip ${galleryFilter===f?'active':''}" onclick="setGalleryFilter('${ea(f)}')">${eh(f)}</div>`).join('')}`;

    const allImgs = [];
    data.entries.forEach(e => {
      (e.images||[]).filter(Boolean).forEach(img => {
        if (galleryFilter === '__all__' || e.folder === galleryFilter)
          allImgs.push({ img, folder: e.folder, prompt: e.prompt });
      });
    });

    const grid = document.getElementById('galleryGrid');
    if (!allImgs.length) { grid.innerHTML = '<div class="empty" style="grid-column:1/-1">No images yet.</div>'; return; }
    grid.innerHTML = allImgs.map(item => `
      <div class="gallery-item" onclick="openLightbox('${item.img}','${ea(item.prompt.substring(0,80))}')">
        <img src="${item.img}" alt="">
        <div class="gallery-overlay"><div class="gallery-folder-tag">${eh(item.folder||'')}</div></div>
      </div>`).join('');
  }

  function setGalleryFilter(f) { galleryFilter = f; renderGallery(); }

  function openLightbox(src, caption) {
    document.getElementById('lightboxImg').src = src;
    document.getElementById('lightboxCaption').textContent = caption || '';
    document.getElementById('lightbox').classList.add('active');
  }
  function closeLightbox() { document.getElementById('lightbox').classList.remove('active'); }

  function exportData() {
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'prompt-library-backup.json'; a.click();
    showToast('Exported!');
  }

  function importData(input) {
    const file = input.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const imported = JSON.parse(e.target.result);
        if (!confirm(`Import ${imported.entries?.length||0} entries? Will merge with existing.`)) return;
        const existingIds = new Set(data.entries.map(e => e.id));
        const newEntries = (imported.entries||[]).filter(e => !existingIds.has(e.id));
        data.entries = [...data.entries, ...newEntries];
        const ef = new Set(data.folders);
        (imported.folders||[]).forEach(f => { if (!ef.has(f)) data.folders.push(f); });
        saveData(); renderFolders(); renderEntries(); showToast(`Imported ${newEntries.length} entries!`);
      } catch { showToast('Import failed'); }
    };
    reader.readAsText(file);
  }

  function showToast(msg) {
    const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
  }

  function eh(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function ea(s) { return String(s).replace(/'/g,"\\'").replace(/\n/g,' '); }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeLightbox(); closeModal('renameFolderModal'); if (editingId) cancelEdit(); }
    if (e.key === 'Enter' && document.getElementById('renameFolderModal').classList.contains('active')) confirmRenameFolder();
  });

  loadData(); renderFolders(); renderEntries();
  document.getElementById('folderSelect').value = data.lastFolder;
</script>
</body>
</html>
