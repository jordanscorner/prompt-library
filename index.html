<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Library</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:wght@400;700&display=swap');

  :root {
    --bg: #0e0e0e;
    --surface: #1a1a1a;
    --border: #2e2e2e;
    --accent: #c9a84c;
    --accent2: #7c6b3a;
    --text: #e8e0d0;
    --muted: #6b6560;
    --danger: #8b3a3a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 2rem;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--accent);
    letter-spacing: 0.05em;
    margin-bottom: 0.25rem;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.75rem;
    margin-bottom: 2rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .add-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.5rem;
    margin-bottom: 2rem;
  }

  .add-card h2 {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--accent);
    margin-bottom: 1rem;
  }

  textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    padding: 0.75rem;
    resize: vertical;
    min-height: 80px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 1rem;
  }

  textarea:focus { border-color: var(--accent2); }
  textarea::placeholder { color: var(--muted); }

  .image-drop-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.75rem;
    margin-bottom: 1rem;
  }

  .img-slot {
    border: 1px dashed var(--border);
    border-radius: 4px;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
    background: var(--bg);
  }

  .img-slot:hover { border-color: var(--accent2); }

  .img-slot span {
    color: var(--muted);
    font-size: 0.7rem;
    text-align: center;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    pointer-events: none;
  }

  .img-slot img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    top: 0; left: 0;
  }

  .img-slot .remove-img {
    position: absolute;
    top: 4px; right: 4px;
    background: rgba(0,0,0,0.7);
    border: none;
    color: #ff6b6b;
    border-radius: 50%;
    width: 20px; height: 20px;
    font-size: 12px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 2;
  }

  .img-slot:hover .remove-img { display: flex; }

  input[type="file"] { display: none; }

  .btn {
    background: var(--accent);
    color: #0e0e0e;
    border: none;
    border-radius: 4px;
    padding: 0.6rem 1.5rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-danger {
    background: transparent;
    border: 1px solid var(--danger);
    color: var(--danger);
    padding: 0.3rem 0.75rem;
    font-size: 0.65rem;
  }

  /* Library */
  .library-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }

  .library-header h2 {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
  }

  .count-badge {
    background: var(--accent2);
    color: var(--accent);
    border-radius: 20px;
    padding: 0.1rem 0.6rem;
    font-size: 0.65rem;
  }

  .search-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    padding: 0.5rem 0.75rem;
    outline: none;
    width: 100%;
    margin-bottom: 1.25rem;
    transition: border-color 0.2s;
  }

  .search-bar:focus { border-color: var(--accent2); }
  .search-bar::placeholder { color: var(--muted); }

  .entries { display: flex; flex-direction: column; gap: 0.75rem; }

  .entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 1rem;
    padding: 1rem 1.25rem;
    transition: border-color 0.2s;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .entry:hover { border-color: var(--accent2); }

  .entry-prompt {
    font-size: 0.78rem;
    line-height: 1.6;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
    cursor: pointer;
    user-select: all;
  }

  .entry-prompt:hover { color: var(--accent); }

  .entry-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 0.5rem;
    min-width: 200px;
  }

  .entry-images {
    display: flex;
    gap: 0.4rem;
  }

  .entry-images img {
    width: 60px;
    height: 60px;
    object-fit: cover;
    border-radius: 3px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: transform 0.2s;
  }

  .entry-images img:hover { transform: scale(1.05); }

  .entry-meta {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  .entry-actions { display: flex; gap: 0.4rem; }

  .empty {
    text-align: center;
    color: var(--muted);
    font-size: 0.75rem;
    padding: 3rem;
    letter-spacing: 0.1em;
  }

  /* Lightbox */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }

  .lightbox.active { display: flex; }

  .lightbox img {
    max-width: 90vw;
    max-height: 90vh;
    object-fit: contain;
    border-radius: 4px;
  }

  .lightbox-close {
    position: fixed;
    top: 1rem; right: 1.5rem;
    background: none;
    border: none;
    color: var(--text);
    font-size: 2rem;
    cursor: pointer;
    z-index: 1001;
  }

  /* Copy toast */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: #0e0e0e;
    padding: 0.5rem 1.25rem;
    border-radius: 20px;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 600px) {
    .image-drop-row { grid-template-columns: 1fr 1fr 1fr; }
    .entry { grid-template-columns: 1fr; }
    .entry-right { align-items: flex-start; }
  }
</style>
</head>
<body>

<h1>Prompt Library</h1>
<p class="subtitle">Paste · Store · Reference</p>

<!-- Add Entry -->
<div class="add-card">
  <h2>+ New Entry</h2>
  <textarea id="promptInput" placeholder="Paste your prompt here..."></textarea>
  <div class="image-drop-row">
    <div class="img-slot" id="slot0" onclick="triggerFile(0)">
      <span>Image 1<br>click to add</span>
      <button class="remove-img" onclick="removeImg(event,0)">×</button>
    </div>
    <div class="img-slot" id="slot1" onclick="triggerFile(1)">
      <span>Image 2<br>click to add</span>
      <button class="remove-img" onclick="removeImg(event,1)">×</button>
    </div>
    <div class="img-slot" id="slot2" onclick="triggerFile(2)">
      <span>Image 3<br>click to add</span>
      <button class="remove-img" onclick="removeImg(event,2)">×</button>
    </div>
  </div>
  <input type="file" id="fileInput0" accept="image/*" onchange="handleFile(0,this)">
  <input type="file" id="fileInput1" accept="image/*" onchange="handleFile(1,this)">
  <input type="file" id="fileInput2" accept="image/*" onchange="handleFile(2,this)">
  <button class="btn" onclick="saveEntry()">Save to Library</button>
</div>

<!-- Library -->
<div class="library-header">
  <h2>Library <span class="count-badge" id="countBadge">0</span></h2>
  <button class="btn btn-danger" onclick="clearAll()">Clear All</button>
</div>
<input class="search-bar" id="searchBar" placeholder="Search prompts..." oninput="renderEntries()">
<div class="entries" id="entriesList"></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <img id="lightboxImg" src="" alt="">
</div>

<!-- Toast -->
<div class="toast" id="toast">Copied!</div>

<script>
  let entries = JSON.parse(localStorage.getItem('promptLib') || '[]');
  let imgData = [null, null, null];

  function save() {
    localStorage.setItem('promptLib', JSON.stringify(entries));
  }

  function triggerFile(i) {
    document.getElementById('fileInput' + i).click();
  }

  function handleFile(i, input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      imgData[i] = e.target.result;
      const slot = document.getElementById('slot' + i);
      let img = slot.querySelector('img');
      if (!img) {
        img = document.createElement('img');
        slot.appendChild(img);
        slot.querySelector('span').style.display = 'none';
      }
      img.src = imgData[i];
    };
    reader.readAsDataURL(file);
  }

  function removeImg(e, i) {
    e.stopPropagation();
    imgData[i] = null;
    const slot = document.getElementById('slot' + i);
    const img = slot.querySelector('img');
    if (img) img.remove();
    slot.querySelector('span').style.display = '';
    document.getElementById('fileInput' + i).value = '';
  }

  function saveEntry() {
    const prompt = document.getElementById('promptInput').value.trim();
    if (!prompt) return;
    entries.unshift({
      id: Date.now(),
      prompt,
      images: [...imgData],
      date: new Date().toLocaleDateString()
    });
    save();
    // Reset
    document.getElementById('promptInput').value = '';
    imgData = [null, null, null];
    for (let i = 0; i < 3; i++) {
      const slot = document.getElementById('slot' + i);
      const img = slot.querySelector('img');
      if (img) img.remove();
      slot.querySelector('span').style.display = '';
      document.getElementById('fileInput' + i).value = '';
    }
    renderEntries();
    showToast('Saved!');
  }

  function deleteEntry(id) {
    entries = entries.filter(e => e.id !== id);
    save();
    renderEntries();
  }

  function clearAll() {
    if (!confirm('Delete all entries?')) return;
    entries = [];
    save();
    renderEntries();
  }

  function copyPrompt(text) {
    navigator.clipboard.writeText(text).then(() => showToast('Copied!'));
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
  }

  function openLightbox(src) {
    document.getElementById('lightboxImg').src = src;
    document.getElementById('lightbox').classList.add('active');
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
  }

  function renderEntries() {
    const q = document.getElementById('searchBar').value.toLowerCase();
    const filtered = entries.filter(e => e.prompt.toLowerCase().includes(q));
    document.getElementById('countBadge').textContent = entries.length;
    const list = document.getElementById('entriesList');
    if (!filtered.length) {
      list.innerHTML = '<div class="empty">No entries yet — paste a prompt above to get started.</div>';
      return;
    }
    list.innerHTML = filtered.map(e => `
      <div class="entry">
        <div class="entry-prompt" title="Click to copy" onclick="copyPrompt(\`${e.prompt.replace(/`/g,'\\`')}\`)">${escHtml(e.prompt)}</div>
        <div class="entry-right">
          <div class="entry-images">
            ${e.images.filter(Boolean).map(img => `<img src="${img}" onclick="openLightbox('${img}')" title="View full size">`).join('')}
          </div>
          <div class="entry-meta">${e.date}</div>
          <div class="entry-actions">
            <button class="btn btn-danger" onclick="deleteEntry(${e.id})">Delete</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  renderEntries();
</script>
</body>
</html>
